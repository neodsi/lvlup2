liip_imagine:
  resolvers:
    default:
      web_path:
        web_root: '%kernel.project_dir%/public'
        cache_prefix: 'media/cache'
  filter_sets:
    team_avatar:
      quality: 85
      filters:
        thumbnail: { size: [200, 200], mode: outbound }
        strip: ~
    team_carousel:
      quality: 82
      filters:
        thumbnail: { size: [1200, 450], mode: outbound }
        strip: ~
    season_planning:
      quality: 82
      filters:
        thumbnail: { size: [800, 600], mode: outbound }
        strip: ~
    season_packages:
      quality: 82
      filters:
        thumbnail: { size: [800, 600], mode: outbound }
        strip: ~
    profile_avatar:
      quality: 85
      filters:
        thumbnail: { size: [150, 150], mode: outbound }
        strip: ~
    team_photo_main:
      quality: 85
      filters:
        thumbnail: { size: [1200, 675], mode: outbound }
        strip: ~
    team_photo_main_sm:
      quality: 80
      filters:
        thumbnail: { size: [600, 338], mode: outbound }
        strip: ~
    team_logo:
      quality: 90
      filters:
        thumbnail: { size: [300, 300], mode: inset }
        background: { size: [300, 300], position: center, color: '#ffffff' }
        strip: ~
